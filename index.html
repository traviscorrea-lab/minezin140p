<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>⛏️ Mini Minecraft 3D</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Courier New', monospace;
            background: #1a1a2e;
            overflow: hidden;
            height: 100vh;
            color: white;
        }

        /* Canvas 3D */
        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
            background: #87CEEB;
        }

        /* Interface do jogo */
        #ui {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            background: rgba(0, 0, 0, 0.7);
            padding: 12px 20px;
            border-radius: 16px;
            backdrop-filter: blur(8px);
            border: 2px solid rgba(255,255,255,0.1);
            flex-wrap: wrap;
            justify-content: center;
            z-index: 10;
        }

        .block-btn {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
            color: white;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
            background: rgba(255,255,255,0.05);
            position: relative;
            font-family: 'Courier New', monospace;
        }

        .block-btn:hover {
            transform: scale(1.1);
            border-color: rgba(255,255,255,0.6);
        }

        .block-btn.active {
            border-color: #FFD700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
            transform: scale(1.05);
        }

        .block-btn .color-preview {
            width: 30px;
            height: 30px;
            border-radius: 6px;
            margin-bottom: 4px;
            border: 1px solid rgba(255,255,255,0.2);
            image-rendering: pixelated;
        }

        .block-btn .label {
            font-size: 8px;
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Pickaxe button */
        #pickaxeBtn {
            background: rgba(139, 69, 19, 0.3);
            border-color: #8B4513;
        }

        #pickaxeBtn .color-preview {
            background: radial-gradient(circle, #CD853F, #8B4513);
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        #pickaxeBtn.active {
            border-color: #FF6B35;
            box-shadow: 0 0 20px rgba(255, 107, 53, 0.4);
        }

        /* Informações */
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            padding: 12px 18px;
            border-radius: 12px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.1);
            font-size: 14px;
            z-index: 10;
            font-family: 'Courier New', monospace;
        }

        #info span {
            color: #FFD700;
        }

        #controls {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.5);
            font-size: 12px;
            z-index: 5;
            text-align: center;
            font-family: 'Courier New', monospace;
            background: rgba(0,0,0,0.3);
            padding: 6px 16px;
            border-radius: 20px;
        }

        /* Mensagem de quebra */
        #breakMsg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            font-weight: bold;
            color: #FF4757;
            text-shadow: 0 0 20px rgba(255, 71, 87, 0.5);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 20;
            font-family: 'Courier New', monospace;
        }

        #breakMsg.show {
            opacity: 1;
        }

        /* Responsivo */
        @media (max-width: 600px) {
            .block-btn {
                width: 48px;
                height: 48px;
            }
            .block-btn .color-preview {
                width: 24px;
                height: 24px;
            }
            .block-btn .label {
                font-size: 6px;
            }
            #ui {
                padding: 8px 12px;
                gap: 8px;
                bottom: 16px;
            }
            #info {
                font-size: 11px;
                padding: 8px 12px;
                top: 10px;
                left: 10px;
            }
        }
    </style>
</head>
<body>

    <!-- Canvas 3D -->
    <div id="gameCanvas"></div>

    <!-- Interface -->
    <div id="info">
        🧱 <span id="blockCount">0</span> blocos colocados &nbsp;|&nbsp; ⛏️ <span id="breakCount">0</span> quebrados
    </div>

    <div id="controls">🖱️ Clique em um bloco para colocar • Clique com a picareta para quebrar</div>

    <div id="breakMsg">💥 BLOCO QUEBRADO!</div>

    <div id="ui">
        <button class="block-btn active" data-block="grass" onclick="selectBlock('grass')">
            <div class="color-preview" style="background: #7CB342;"></div>
            <span class="label">Grama</span>
        </button>
        <button class="block-btn" data-block="wood" onclick="selectBlock('wood')">
            <div class="color-preview" style="background: #8D6E63;"></div>
            <span class="label">Madeira</span>
        </button>
        <button class="block-btn" data-block="stone" onclick="selectBlock('stone')">
            <div class="color-preview" style="background: #9E9E9E;"></div>
            <span class="label">Pedra</span>
        </button>
        <button class="block-btn" data-block="iron" onclick="selectBlock('iron')">
            <div class="color-preview" style="background: #B0BEC5;"></div>
            <span class="label">Ferro</span>
        </button>
        <button class="block-btn" data-block="diamond" onclick="selectBlock('diamond')">
            <div class="color-preview" style="background: #4DD0E1;"></div>
            <span class="label">Diamante</span>
        </button>
        <button class="block-btn" id="pickaxeBtn" data-block="pickaxe" onclick="selectBlock('pickaxe')">
            <div class="color-preview">⛏️</div>
            <span class="label">Picareta</span>
        </button>
    </div>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js">
    </script>

    <script>
        // ============================================================
        // CONFIGURAÇÕES
        // ============================================================
        const BLOCK_SIZE = 1;
        const WORLD_SIZE = 10;

        // Cores dos blocos (estilo Minecraft)
        const BLOCK_COLORS = {
            grass: 0x7CB342,
            wood: 0x8D6E63,
            stone: 0x9E9E9E,
            iron: 0xB0BEC5,
            diamond: 0x4DD0E1
        };

        // Nomes dos blocos
        const BLOCK_NAMES = {
            grass: 'Grama',
            wood: 'Madeira',
            stone: 'Pedra',
            iron: 'Ferro',
            diamond: 'Diamante'
        };

        let selectedBlock = 'grass';
        let blockCount = 0;
        let breakCount = 0;

        // ============================================================
        // CENA 3D
        // ============================================================
        const container = document.getElementById('gameCanvas');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);

        // Câmera
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(8, 8, 8);
        camera.lookAt(0, 0, 0);

        // Renderizador
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        // Controles Orbit (para girar a visão)
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.1;
        controls.maxDistance = 25;
        controls.minDistance = 3;
        controls.target.set(0, 0, 0);

        // ============================================================
        // LUZES
        // ============================================================
        // Luz ambiente
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);

        // Luz direcional (sol)
        const sunLight = new THREE.DirectionalLight(0xFFEECC, 1);
        sunLight.position.set(10, 20, 10);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 1024;
        sunLight.shadow.mapSize.height = 1024;
        const d = 20;
        sunLight.shadow.camera.left = -d;
        sunLight.shadow.camera.right = d;
        sunLight.shadow.camera.top = d;
        sunLight.shadow.camera.bottom = -d;
        sunLight.shadow.camera.near = 1;
        sunLight.shadow.camera.far = 50;
        scene.add(sunLight);

        // Luz de preenchimento
        const fillLight = new THREE.DirectionalLight(0x8888FF, 0.3);
        fillLight.position.set(-10, 5, -10);
        scene.add(fillLight);

        // ============================================================
        // CHÃO (grid)
        // ============================================================
        function createGround() {
            const groundGroup = new THREE.Group();

            // Grid de blocos de grama no chão
            const half = Math.floor(WORLD_SIZE / 2);
            for (let x = -half; x <= half; x++) {
                for (let z = -half; z <= half; z++) {
                    // Pula o centro (0,0) para colocar um bloco especial
                    if (x === 0 && z === 0) continue;

                    const geometry = new THREE.BoxGeometry(BLOCK_SIZE * 0.98, 0.5, BLOCK_SIZE * 0.98);
                    const material = new THREE.MeshLambertMaterial({
                        color: 0x7CB342,
                        emissive: 0x1a3a1a,
                        emissiveIntensity: 0.1
                    });
                    const block = new THREE.Mesh(geometry, material);
                    block.position.set(x * BLOCK_SIZE, -0.25, z * BLOCK_SIZE);
                    block.receiveShadow = true;
                    block.castShadow = true;
                    groundGroup.add(block);
                }
            }

            // Bloco central de grama
            const centerGeo = new THREE.BoxGeometry(BLOCK_SIZE * 0.98, 0.5, BLOCK_SIZE * 0.98);
            const centerMat = new THREE.MeshLambertMaterial({
                color: 0x7CB342,
                emissive: 0x1a3a1a,
                emissiveIntensity: 0.1
            });
            const centerBlock = new THREE.Mesh(centerGeo, centerMat);
            centerBlock.position.set(0, -0.25, 0);
            centerBlock.receiveShadow = true;
            centerBlock.castShadow = true;
            groundGroup.add(centerBlock);

            scene.add(groundGroup);
        }
        createGround();

        // ============================================================
        // GERENCIADOR DE BLOCOS
        // ============================================================
        const blocks = {};
        const blockMeshes = [];

        function addBlock(x, y, z, type) {
            const key = `${x},${y},${z}`;
            if (blocks[key]) return false;

            const color = BLOCK_COLORS[type] || 0x888888;
            const geometry = new THREE.BoxGeometry(BLOCK_SIZE * 0.95, BLOCK_SIZE * 0.95, BLOCK_SIZE * 0.95);
            const material = new THREE.MeshLambertMaterial({
                color: color,
                emissive: new THREE.Color(color).multiplyScalar(0.15),
                emissiveIntensity: 0.2
            });
            const block = new THREE.Mesh(geometry, material);
            block.position.set(x * BLOCK_SIZE, y * BLOCK_SIZE + 0.5, z * BLOCK_SIZE);
            block.castShadow = true;
            block.receiveShadow = true;

            // Armazena o tipo no objeto
            block.userData = { type: type, x: x, y: y, z: z };

            scene.add(block);
            blocks[key] = block;
            blockMeshes.push(block);

            blockCount++;
            document.getElementById('blockCount').textContent = blockCount;

            return true;
        }

        function removeBlock(x, y, z) {
            const key = `${x},${y},${z}`;
            if (!blocks[key]) return false;

            const block = blocks[key];
            scene.remove(block);
            delete blocks[key];

            // Remove do array
            const index = blockMeshes.indexOf(block);
            if (index > -1) blockMeshes.splice(index, 1);

            blockCount--;
            breakCount++;
            document.getElementById('blockCount').textContent = blockCount;
            document.getElementById('breakCount').textContent = breakCount;

            // Mostra mensagem de quebra
            showBreakMessage();

            return true;
        }

        function showBreakMessage() {
            const msg = document.getElementById('breakMsg');
            msg.classList.add('show');
            clearTimeout(msg._timeout);
            msg._timeout = setTimeout(() => {
                msg.classList.remove('show');
            }, 500);
        }

        // ============================================================
        // RAYCASTER (detectar clique)
        // ============================================================
        const raycaster = new THREE.Raycaster();
        const pointer = new THREE.Vector2();

        function getBlockPosition(block) {
            const pos = block.position;
            return {
                x: Math.round(pos.x / BLOCK_SIZE),
                y: Math.round((pos.y - 0.5) / BLOCK_SIZE),
                z: Math.round(pos.z / BLOCK_SIZE)
            };
        }

        function getIntersection(event) {
            const rect = renderer.domElement.getBoundingClientRect();
            pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

            raycaster.setFromCamera(pointer, camera);

            // Todos os objetos na cena (blocos + chão)
            const meshes = [];
            scene.children.forEach(child => {
                if (child.isMesh) {
                    meshes.push(child);
                }
            });

            const intersects = raycaster.intersectObjects(meshes);
            if (intersects.length > 0) {
                return intersects[0];
            }
            return null;
        }

        function getPlacementPosition(intersect) {
            const point = intersect.point;
            const normal = intersect.face.normal.clone();

            // Arredonda para o bloco mais próximo
            let x = Math.round(point.x / BLOCK_SIZE);
            let y = Math.round((point.y - 0.5) / BLOCK_SIZE);
            let z = Math.round(point.z / BLOCK_SIZE);

            // Ajusta para colocar o bloco na face clicada
            if (normal.x > 0.5) x += 1;
            else if (normal.x < -0.5) x -= 1;
            else if (normal.y > 0.5) y += 1;
            else if (normal.y < -0.5) y -= 1;
            else if (normal.z > 0.5) z += 1;
            else if (normal.z < -0.5) z -= 1;

            // Limita o mundo
            const half = Math.floor(WORLD_SIZE / 2);
            if (Math.abs(x) > half || Math.abs(z) > half) return null;
            if (y < -1 || y > 8) return null;

            return { x, y, z };
        }

        // ============================================================
        // EVENTOS DE CLIQUE
        // ============================================================
        renderer.domElement.addEventListener('click', function(event) {
            const intersect = getIntersection(event);
            if (!intersect) return;

            const object = intersect.object;

            // Se for um bloco e a picareta estiver selecionada -> quebrar
            if (selectedBlock === 'pickaxe') {
                // Tenta remover o bloco
                const pos = getBlockPosition(object);
                const removed = removeBlock(pos.x, pos.y, pos.z);
                if (removed) {
                    // Efeito visual (opcional)
                }
                return;
            }

            // Se for um bloco e não for picareta -> colocar
            if (selectedBlock !== 'pickaxe') {
                // Se clicou em um bloco existente
                if (object.userData && object.userData.type) {
                    const pos = getBlockPosition(object);
                    // Tenta colocar ao lado
                    const placePos = getPlacementPosition(intersect);
                    if (placePos) {
                        addBlock(placePos.x, placePos.y, placePos.z, selectedBlock);
                    }
                } else {
                    // Clicou no chão
                    const placePos = getPlacementPosition(intersect);
                    if (placePos) {
                        addBlock(placePos.x, placePos.y, placePos.z, selectedBlock);
                    }
                }
            }
        });

        // ============================================================
        // SELEÇÃO DE BLOCO
        // ============================================================
        function selectBlock(type) {
            selectedBlock = type;

            // Atualiza UI
            document.querySelectorAll('.block-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            const btn = document.querySelector(`.block-btn[data-block="${type}"]`);
            if (btn) btn.classList.add('active');

            // Muda o cursor
            renderer.domElement.style.cursor = type === 'pickaxe' ? 'pointer' : 'crosshair';
        }

        // ============================================================
        // BLOCO INICIAL
        // ============================================================
        // Adiciona alguns blocos para começar
        addBlock(0, 0, 0, 'grass');
        addBlock(1, 0, 0, 'wood');
        addBlock(-1, 0, 0, 'stone');
        addBlock(0, 0, 1, 'iron');
        addBlock(0, 0, -1, 'diamond');

        // ============================================================
        // ANIMAÇÃO
        // ============================================================
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // ============================================================
        // REDIMENSIONAR
        // ============================================================
        window.addEventListener('resize', function() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ============================================================
        // INSTRUÇÕES NO CONSOLE
        // ============================================================
        console.log('🎮 Mini Minecraft 3D carregado!');
        console.log('🖱️ Clique com o botão esquerdo para colocar blocos');
        console.log('⛏️ Selecione a picareta para quebrar blocos');
        console.log('🔄 Arraste para girar a visão');
        console.log('📦 Blocos disponíveis: Grama, Madeira, Pedra, Ferro, Diamante');

        // ============================================================
        // DICA DE USO
        // ============================================================
        console.log('💡 Dica: Clique na borda de um bloco para colocar ao lado!');
    </script>

</body>
</html>
